name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and Analyze
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java for SonarCloud
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 3. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 4. Cache SonarCloud packages
      - name: Cache SonarCloud Packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 5. Install SonarCloud scanner
      - name: Install SonarCloud Scanner
        run: dotnet tool install --global dotnet-sonarscanner

      # 6. Restore NuGet packages
      - name: Restore NuGet Packages
        run: dotnet restore TestCiCd.slnx

      # 7. Check formatting
      - name: Check Code Formatting
        run: dotnet format TestCiCd.slnx --verify-no-changes --verbosity diagnostic

      # 8. Begin SonarCloud scan
      - name: Begin SonarCloud Scan
        run: |
          dotnet sonarscanner begin \
            /k:"yashjuneja_MyApiProject" \
            /o:"yashjuneja" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"

      # 9. Build with Roslyn analyzers
      - name: Build Solution
        run: dotnet build TestCiCd.slnx --configuration Release --no-restore

      # 10. Run tests with coverage
      - name: Run Tests With Coverage
        run: |
          dotnet test TestCiCd.slnx \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      # 11. End SonarCloud scan
      - name: End SonarCloud Scan
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}